<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentSwarp</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--card:#f5f5f7;--card2:#fff;--border:#e5e5e5;--text:#1d1d1f;--dim:#86868b;--accent:#0071e3;--green:#34c759;--input:#fff;--chat:#f5f5f7}
[data-theme="dark"]{--bg:#0a0a0a;--card:#141414;--card2:#1a1a1a;--border:#222;--text:#e0e0e0;--dim:#666;--accent:#0071e3;--green:#34c759;--input:#141414;--chat:#111}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;min-height:100vh}
nav{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.logo{font-weight:700;font-size:1.1em;letter-spacing:-.5px}
.nav-right{display:flex;gap:8px;align-items:center}
.theme-btn{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;color:var(--text);transition:all .2s}
.theme-btn:hover{border-color:var(--accent)}
.theme-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.badge{background:var(--green);color:#fff;padding:4px 12px;border-radius:12px;font-size:11px;font-weight:600}
.wrap{max-width:1100px;margin:0 auto;padding:20px 24px;display:grid;grid-template-columns:1fr 300px;gap:20px}
@media(max-width:860px){.wrap{grid-template-columns:1fr}.side{display:none}}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:14px}
.card h3{font-size:.75em;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.val{font-size:1.8em;font-weight:700;letter-spacing:-1px}
label{font-size:.72em;font-weight:500;color:var(--dim);display:block;margin-bottom:4px}
input,select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:13px;outline:none;background:var(--input);color:var(--text);font-family:inherit;transition:border .2s}
input:focus,select:focus{border-color:var(--accent)}
.btn{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.btn:hover{filter:brightness(1.1)}
.btn:active{transform:scale(.97)}
.chat{height:340px;overflow-y:auto;padding:14px;background:var(--chat);border-radius:14px;margin-bottom:10px}
.msg{max-width:78%;margin-bottom:6px;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.45}
.msg.me{background:var(--accent);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.msg.bot{background:var(--card2);border:1px solid var(--border);border-bottom-left-radius:4px}
.row{display:flex;gap:8px}
.input{flex:1;padding:12px 16px;border:1px solid var(--border);border-radius:24px;font-size:14px;outline:none;background:var(--input);color:var(--text)}
.input:focus{border-color:var(--accent)}
.btn-send{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:16px}
.item{padding:10px;border-radius:10px;font-size:13px;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:space-between}
.item:hover{background:var(--card)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.dot.idle{background:var(--dim)}
select option{background:var(--card);color:var(--text)}
</style>
</head>
<body>
<nav>
<div class="logo">AgentSwarp</div>
<div class="nav-right">
<span class="badge">● Online</span>
<button class="theme-btn active" onclick="setTheme('light')">Light</button>
<button class="theme-btn" onclick="setTheme('dark')">Dark</button>
<button class="theme-btn" onclick="setTheme('system')">System</button>
</div>
</nav>
<div class="wrap">
<div>
<div class="chat" id="chat"><div class="msg bot"><b>Agent</b><br>Ready. What should I build?</div></div>
<div class="row"><input class="input" id="msg" placeholder="Type a goal..." onkeypress="if(event.key==='Enter')send()"><button class="btn-send" onclick="send()">→</button></div>
<div class="card"><h3>Tasks</h3>
<div class="item"><span class="dot"></span>Research AI trends</div>
<div class="item"><span class="dot"></span>Build landing page</div>
<div class="item"><span class="dot idle"></span>Deploy to GitHub <span class="badge">done</span></div>
</div>
</div>
<div class="side">
<div class="card"><h3>Model</h3>
<label>Provider</label>
<select><option>OpenRouter</option><option>Groq</option><option>Ollama</option></select>
<label>Model ID</label>
<input value="openrouter/healer-alpha">
<label>API Key</label>
<input type="password" value="sk-...">
</div>
<div class="card"><h3>Skills</h3>
<div class="item">🔍 Web Search <span class="dot"></span></div>
<div class="item">💻 Shell Exec <span class="dot"></span></div>
<div class="item">📁 Files <span class="dot"></span></div>
<div class="item">🐙 GitHub <span class="dot"></span></div>
<div class="item">🌐 Browser <span class="dot"></span></div>
</div>
<div class="card"><h3>Memory</h3>
<div class="item">Short-term ✅</div>
<div class="item">SQLite ✅</div>
<div class="item">Pinecone 🔧</div>
</div>
</div>
</div>
<script>
function setTheme(t){
document.documentElement.setAttribute('data-theme',t);
document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
localStorage.setItem('theme',t);
}
var saved=localStorage.getItem('theme');
if(saved){document.documentElement.setAttribute('data-theme',saved);}
function send(){var m=document.getElementById('msg').value;if(!m)return;
var c=document.getElementById('chat');
c.innerHTML+=<div class="msg me">'+m+'</div>';
document.getElementById('msg').value='';
c.scrollTop=c.scrollHeight;
fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goal:m})}).then(r=>r.json()).then(d=>{c.innerHTML+='<div class="msg bot"><b>Agent</b><br>Task '+d.id.slice(0,8)+' added</div>';c.scrollTop=c.scrollHeight;}).catch(e=>{c.innerHTML+='<div class="msg bot">Error</div>';});
}
</script>
</body>
</html>
