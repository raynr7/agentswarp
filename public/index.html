<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentSwarp</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--dim:#8b949e;--accent:#58a6ff;--green:#3fb950}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text)}
.top{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.logo{font-weight:700;font-size:18px}
.wrap{max-width:1100px;margin:0 auto;padding:16px;display:grid;grid-template-columns:1fr 280px;gap:16px}
@media(max-width:800px){.wrap{grid-template-columns:1fr}.side{display:none}}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card h3{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
input,select,textarea{width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
input:focus,select:focus{border-color:var(--accent)}
.btn{background:var(--accent);color:#000;border:none;padding:10px 16px;border-radius:8px;font-weight:600;cursor:pointer;width:100%}
.btn:hover{filter:brightness(1.1)}
.chat{height:320px;overflow-y:auto;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}
.msg{padding:8px 12px;border-radius:8px;margin-bottom:6px;max-width:80%;font-size:13px;line-height:1.4}
.msg.a{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:2px}
.msg.u{background:#1f6feb;color:#fff;margin-left:auto;border-bottom-right-radius:2px}
.row{display:flex;gap:6px}
.input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:13px;outline:none}
.send{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#000;border:none;cursor:pointer;font-weight:700}
.item{padding:8px 10px;border-radius:8px;font-size:12px;display:flex;align-items:center;gap:8px}
.item:hover{background:var(--card)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
label{font-size:11px;color:var(--dim);display:block;margin-bottom:4px}
select option{background:var(--card)}
</style>
</head>
<body>
<div class="top"><div class="logo">AgentSwarp</div><span style="color:var(--green);font-size:12px">● Online</span></div>
<div class="wrap">
<div>
<div class="chat" id="chat"><div class="msg a"><b style="color:var(--accent)">Agent</b><br>Ready. What should I work on?</div></div>
<div class="row"><input class="input" id="msg" placeholder="Describe a task or goal..." onkeypress="if(event.key=='Enter')send()"><button class="send" onclick="send()">Go</button></div>
<div class="card"><h3>Recent Tasks</h3>
<div class="item"><span class="dot"></span>Research latest AI agent frameworks</div>
<div class="item"><span class="dot"></span>Build a Chrome extension for LinkedIn</div>
<div class="item"><span class="dot"></span>Deploy landing page to Vercel</div>
</div>
</div>
<div class="side">
<div class="card"><h3>Model</h3>
<label>Provider</label>
<select><option>Groq</option><option>OpenRouter</option><option>Ollama</option></select>
<label>Model</label>
<select>
<option>llama-3.1-8b-instant</option>
<option>llama-3.3-70b-versatile</option>
<option>qwen/qwen3-32b</option>
</select>
</div>
<div class="card"><h3>Agents</h3>
<div class="item"><span class="dot"></span>Research Agent</div>
<div class="item"><span class="dot"></span>Code Builder</div>
<div class="item"><span class="dot"></span>Deploy Agent</div>
<div class="item"><span class="dot"></span>Memory Keeper</div>
</div>
<div class="card"><h3>Config</h3>
<label>Max tasks/hr</label>
<input value="99999">
<label>Allowed</label>
<input value="*">
</div>
</div>
</div>
<script>
function send(){var m=document.getElementById('msg').value;if(!m)return;var c=document.getElementById('chat');
c.innerHTML+='<div class="msg u">'+m+'</div>';document.getElementById('msg').value='';
fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goal:m})}).then(r=>r.json()).then(d=>{c.innerHTML+='<div class="msg a"><b style="color:var(--accent)">Agent</b><br>Task '+d.id.slice(0,8)+' created</div>';}).catch(e=>{c.innerHTML+='<div class="msg a">Error: '+e.message+'</div>';});}
</script>
</body>
</html>
