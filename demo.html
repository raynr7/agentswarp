<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentSwarp - Demo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐝</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --bg2: #12121a;
            --bg3: #1a1a25;
            --accent: #6c5ce7;
            --accent2: #a29bfe;
            --cyan: #00cec9;
            --pink: #fd79a8;
            --orange: #fdcb6e;
            --green: #00b894;
            --text: #e2e8f0;
            --text2: #94a3b8;
            --border: #2d2d3a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Nav */
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1rem 2rem;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .logo {
            display: flex; align-items: center; gap: 0.5rem;
            font-weight: 800; font-size: 1.3rem;
            text-decoration: none;
            color: var(--text);
        }
        .logo span { color: var(--accent2); }
        .back-link {
            color: var(--text2);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: var(--text); }

        /* Main layout */
        .demo-container {
            padding-top: 80px;
            display: flex;
            height: 100vh;
        }

        /* Sidebar - Agent swarm visualization */
        .swarm-panel {
            width: 320px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .swarm-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text2);
            margin-bottom: 1rem;
        }

        /* Swarm visualization */
        #swarm-canvas {
            width: 100%;
            height: 200px;
            background: var(--bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        .agent-status {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            background: var(--bg);
            border: 1px solid transparent;
            transition: all 0.3s;
        }
        .agent-status.active {
            border-color: var(--accent);
            background: rgba(108, 92, 231, 0.08);
        }
        .agent-status.completed {
            border-color: var(--green);
            background: rgba(0, 184, 148, 0.05);
        }
        .agent-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--text2);
            flex-shrink: 0;
        }
        .agent-status.active .agent-dot {
            background: var(--accent2);
            animation: pulse-dot 1s infinite;
        }
        .agent-status.completed .agent-dot { background: var(--green); }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }
        .agent-info { flex: 1; }
        .agent-name { font-size: 0.85rem; font-weight: 600; }
        .agent-task { font-size: 0.7rem; color: var(--text2); }
        .agent-time { font-size: 0.7rem; color: var(--text2); font-family: 'JetBrains Mono', monospace; }

        /* Main content */
        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            max-width: 900px;
        }

        .demo-header {
            margin-bottom: 2rem;
        }
        .demo-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .demo-header p { color: var(--text2); font-size: 0.95rem; }

        /* Task input */
        .task-input-container {
            margin-bottom: 2rem;
        }
        .task-input-wrapper {
            display: flex;
            gap: 0.75rem;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem;
        }
        .task-input-wrapper:focus-within { border-color: var(--accent); }
        .task-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            padding: 0.5rem;
        }
        .task-input::placeholder { color: var(--text2); }
        .run-btn {
            padding: 0.6rem 1.5rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .run-btn:hover { background: #5b4bd5; }
        .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Example tasks */
        .examples {
            display: flex; gap: 0.5rem; flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .example-btn {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg2);
            color: var(--text2);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .example-btn:hover { border-color: var(--accent); color: var(--text); }

        /* Results */
        .results-area {
            flex: 1;
            overflow-y: auto;
        }

        .result-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 1rem;
            overflow: hidden;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
        }
        .result-icon {
            width: 36px; height: 36px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
        }
        .result-icon.research { background: rgba(0, 206, 201, 0.15); }
        .result-icon.content { background: rgba(253, 203, 110, 0.15); }
        .result-icon.design { background: rgba(253, 121, 168, 0.15); }
        .result-icon.data { background: rgba(0, 184, 148, 0.15); }
        .result-icon.deploy { background: rgba(162, 155, 254, 0.15); }
        .result-header-info { flex: 1; }
        .result-header-info h3 { font-size: 0.95rem; font-weight: 600; }
        .result-header-info span { font-size: 0.75rem; color: var(--text2); }
        .result-timing {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text2);
        }
        .result-body {
            padding: 1.25rem;
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--text);
        }
        .result-body code {
            background: var(--bg);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }

        .typing-indicator {
            display: flex; gap: 4px; padding: 0.5rem 0;
        }
        .typing-indicator span {
            width: 8px; height: 8px;
            background: var(--accent2);
            border-radius: 50%;
            animation: bounce 1.4s infinite both;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.16s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.32s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .demo-container { flex-direction: column; }
            .swarm-panel {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 300px;
            }
            #swarm-canvas { height: 150px; }
        }
    </style>
</head>

    <script>
        // ==================== SWARM ANIMATION ====================
        const canvas = document.getElementById('swarm-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animFrame;

        const agentColors = {
            research: '#00cec9',
            content: '#fdcb6e',
            design: '#fd79a8',
            data: '#00b894',
            deploy: '#a29bfe'
        };

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth * 2;
            canvas.height = canvas.offsetHeight * 2;
            ctx.scale(2, 2);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor(color) {
                this.x = canvas.offsetWidth / 2 + (Math.random() - 0.5) * 100;
                this.y = canvas.offsetHeight / 2 + (Math.random() - 0.5) * 100;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                this.radius = 2 + Math.random() * 3;
                this.color = color || '#6c5ce7';
                this.life = 1;
                this.decay = 0.002 + Math.random() * 0.005;
                this.wanderAngle = Math.random() * Math.PI * 2;
            }
            update() {
                this.wanderAngle += (Math.random() - 0.5) * 0.3;
                this.vx += Math.cos(this.wanderAngle) * 0.05;
                this.vy += Math.sin(this.wanderAngle) * 0.05;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                // Bounce
                if (this.x < 0 || this.x > canvas.offsetWidth) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.offsetHeight) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life * 0.7;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function initSwarm() {
            particles = [];
            for (let i = 0; i < 30; i++) {
                const colors = Object.values(agentColors);
                particles.push(new Particle(colors[i % colors.length]));
            }
        }

        function activateSwarm(agentType) {
            const color = agentColors[agentType] || '#6c5ce7';
            for (let i = 0; i < 12; i++) {
                particles.push(new Particle(color));
            }
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 60) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = '#6c5ce7';
                        ctx.globalAlpha = (1 - dist / 60) * 0.15 * Math.min(particles[i].life, particles[j].life);
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                }
            }
        }

        function animateSwarm() {
            ctx.clearRect(0, 0, canvas.offsetWidth, canvas.offsetHeight);
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            drawConnections();
            animFrame = requestAnimationFrame(animateSwarm);
        }

        initSwarm();
        animateSwarm();

        // ==================== TASK SIMULATION ====================

                    "sales data": "📊 **Research Findings:**\n\nSales analytics framework:\n• **Revenue by channel**: Identify top-performing acquisition channels\n• **Cohort analysis**: Track customer lifetime value over time\n• **Funnel metrics**: Conversion rates at each stage\n• **Seasonal patterns**: Q4 typically 35-40% higher for B2C\n• **Churn indicators**: Declining engagement = 3x churn risk",
                    "Twitter": "📊 **Research Findings:**\n\nTwitter/X thread strategy:\n• Hook tweet: Question or bold claim (drives 2x engagement)\n• Optimal length: 8-12 tweets for viral potential\n• Best posting times: 8-10am, 12-1pm, 5-6pm EST\n• Thread format: Numbered list with each tweet standalone\n• Engagement triggers: Tag relevant accounts, use 1-2 hashtags",
                    "portfolio": "📊 **Research Findings:**\n\nPortfolio site trends:\n• Minimalist design with bold typography\n• Project case studies > project galleries\n• Dark mode preferred by 68% of tech recruiters\n• Loading speed critical: >3s = 53% bounce rate\n• Mobile-first: 62% of recruiter views are on mobile"
                },
                default: "📊 **Research Findings:**\n\nAnalyzed 47 sources across web, academic papers, and industry reports. Key insights extracted and synthesized for the content team."
            },
            content: {

                    "SaaS": "✍️ **Content Draft:**\n\n# Ship Faster. Scale Smarter.\n\nYour team shouldn't spend weeks on what AI agents can finish in hours.\n\n**The problem:** Development bottlenecks kill momentum. You lose deals waiting for features that should've shipped yesterday.\n\n**The solution:** Deploy AI agents that handle research, coding, testing, and deployment — all while your team focuses on strategy.\n\n[Start Free Trial] — No credit card required.",

            design: {

                results: {

                },

            },
            data: {
                task: "Analyzing and structuring data...",
                results: {
                    "sales": "📊 **Data Analysis:**\n\n| Metric | Value | Trend |\n|--------|-------|-------|\n| Revenue | $142K | ↑ 23% |\n| Customers | 1,247 | ↑ 18% |\n| Churn Rate | 4.2% | ↓ 1.1% |\n| Avg Deal Size | $3,400 | ↑ 12% |\n| CAC | $185 | ↓ 8% |\n\n**Key Insight:** Revenue growth outpacing customer growth → upsells working well. Recommendation: Double down on expansion revenue.",
                    "default": "📊 **Data Analysis:**\n\nStructured data into actionable formats. Generated visualizations, identified key trends, and created summary metrics dashboard."
                },
                default: "📊 **Data Analysis:**\n\nStructured data into actionable formats. Generated visualizations, identified key trends, and created summary metrics dashboard."
            },
            deploy: {
                task: "Preparing deployment...",
                default: "🚀 **Deployment:**\n\n✅ Build successful\n✅ Tests passed (12/12)\n✅ Deployed to production\n🔗 Live at: `agentswarm-demo.vercel.app`\n\n**Status:** All systems operational. Monitoring enabled. Auto-scaling configured."
            }
        };

        const taskAgentMap = {
            "AI trends": ["research", "content"],
            "SaaS": ["research", "content", "design"],
            "sales data": ["research", "data"],
            "Twitter": ["research", "content"],
            "portfolio": ["research", "design", "deploy"],
            "write": ["content"],
            "analyze": ["data", "research"],
            "deploy": ["deploy", "design"],
            "build": ["design", "deploy"]
        };

        function detectAgents(task) {
            const lower = task.toLowerCase();
            let agents = new Set();

            // Keyword-based agent selection
            if (lower.includes('research') || lower.includes('find') || lower.includes('search') || lower.includes('trend'))
                agents.add('research');
            if (lower.includes('write') || lower.includes('blog') || lower.includes('content') || lower.includes('post') || lower.includes('thread') || lower.includes('summar'))
                agents.add('content');
            if (lower.includes('design') || lower.includes('landing') || lower.includes('page') || lower.includes('layout') || lower.includes('ui') || lower.includes('portfolio'))
                agents.add('design');
            if (lower.includes('data') || lower.includes('analy') || lower.includes('report') || lower.includes('metric') || lower.includes('sales') || lower.includes('dashboard'))
                agents.add('data');
            if (lower.includes('deploy') || lower.includes('ship') || lower.includes('launch') || lower.includes('build') || lower.includes('site'))
                agents.add('deploy');

            // Default: if nothing matched, use all
            if (agents.size === 0) {
                agents.add('research');
                agents.add('content');
                agents.add('data');
            }

            return Array.from(agents);
        }

        function getResponse(agentType, task) {
            const responses = agentResponses[agentType];
            if (!responses) return { task: "Processing...", result: "Task completed." };

            const lower = task.toLowerCase();
            for (const key of Object.keys(responses.results || {})) {
                if (lower.includes(key.toLowerCase())) {
                    return { task: responses.task, result: responses.results[key] };
                }
            }
            return { task: responses.task, result: responses.default };
        }

        let isRunning = false;

        async function runTask() {
            if (isRunning) return;
            const taskInput = document.getElementById('task-input');
            const task = taskInput.value.trim();
            if (!task) return;

            isRunning = true;
            document.getElementById('run-btn').disabled = true;
            document.getElementById('run-btn').textContent = 'Running...';
            document.getElementById('results-area').innerHTML = '';

            // Reset agent statuses
            document.querySelectorAll('.agent-status').forEach(el => {
                el.classList.remove('active', 'completed');
                el.querySelector('.agent-task').textContent = 'Idle';
            });

            const agents = detectAgents(task);
            const delays = [0, 800, 1600, 2400, 3200];

            // Activate agents sequentially with visual delay
            for (let i = 0; i < agents.length; i++) {
                await sleep(delays[i]);
                const agentType = agents[i];
                const statusEl = document.querySelector(`[data-agent="${agentType}"]`);
                const response = getResponse(agentType, task);

                // Activate agent
                statusEl.classList.add('active');
                statusEl.querySelector('.agent-task').textContent = response.task;

                // Add particles
                activateSwarm(agentType);

                // Add typing indicator
                const resultsArea = document.getElementById('results-area');
                const typingCard = createTypingCard(agentType);
                resultsArea.appendChild(typingCard);
                resultsArea.scrollTop = resultsArea.scrollHeight;
            }

            // Resolve agents sequentially
            for (let i = 0; i < agents.length; i++) {
                await sleep(1500 + Math.random() * 1000);
                const agentType = agents[i];
                const statusEl = document.querySelector(`[data-agent="${agentType}"]`);
                const response = getResponse(agentType, task);

                // Mark complete
                statusEl.classList.remove('active');
                statusEl.classList.add('completed');
                statusEl.querySelector('.agent-task').textContent = 'Done ✓';

                // Replace typing with result
                const resultsArea = document.getElementById('results-area');
                const typingCards = resultsArea.querySelectorAll('.typing-card');
                if (typingCards[i]) {
                    typingCards[i].replaceWith(createResultCard(agentType, response));
                }
                resultsArea.scrollTop = resultsArea.scrollHeight;
            }

            // Reset button
            isRunning = false;
            document.getElementById('run-btn').disabled = false;
            document.getElementById('run-btn').textContent = 'Run Swarm 🐝';
        }

        function createTypingCard(agentType) {
            const icons = { research: '🔍', content: '✍️', design: '🎨', data: '📊', deploy: '🚀' };
            const names = { research: 'Research Agent', content: 'Content Agent', design: 'Design Agent', data: 'Data Agent', deploy: 'Deploy Agent' };
            const div = document.createElement('div');
            div.className = 'result-card typing-card';
            div.innerHTML = `
                <div class="result-header">
                    <div class="result-icon ${agentType}">${icons[agentType]}</div>
                    <div class="result-header-info">
                        <h3>${names[agentType]}</h3>
                        <span>Working...</span>
                    </div>
                    <div class="typing-indicator"><span></span><span></span><span></span></div>
                </div>
                <div class="result-body"><em style="color: var(--text2);">Generating response...</em></div>
            `;
            return div;
        }

        function createResultCard(agentType, response) {
            const icons = { research: '🔍', content: '✍️', design: '🎨', data: '📊', deploy: '🚀' };
            const names = { research: 'Research Agent', content: 'Content Agent', design: 'Design Agent', data: 'Data Agent', deploy: 'Deploy Agent' };
            const time = (1 + Math.random() * 3).toFixed(1);
            const div = document.createElement('div');
            div.className = 'result-card';
            div.innerHTML = `
                <div class="result-header">
                    <div class="result-icon ${agentType}">${icons[agentType]}</div>
                    <div class="result-header-info">
                        <h3>${names[agentType]}</h3>
                        <span>Completed</span>
                    </div>
                    <div class="result-timing">${time}s</div>
                </div>
                <div class="result-body">${formatResponse(response.result)}</div>
            `;
            return div;
        }

        function formatResponse(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^• /gm, '• ');
        }

        function useExample(btn) {
            document.getElementById('task-input').value = btn.textContent;
            runTask();
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Enter key
        document.getElementById('task-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') runTask();
        });
    </script>
</body>
</html>
