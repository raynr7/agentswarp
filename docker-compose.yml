version: '3.8'

services:
  # Next.js 14 Frontend - Highly optimized for low-RAM OCI deployments
  web:
    build: 
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - API_URL=http://api:8000
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 200M

  # FastAPI Python Backend - Core Engine for Autonomous Sub-Agents
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - WORKERS=1 # Enforce single worker for low-RAM footprint
      - DATABASE_URL=postgresql://postgres:gravityclaw@db:5432/agentswarp
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          memory: 250M

  # Postgres + pgvector for 3-Tier Agent memory storage
  db:
    image: ankane/pgvector:latest
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=gravityclaw
      - POSTGRES_DB=agentswarp
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 250M

  # Redis for real-time multiplayer cursors & fast KV cache
  redis:
    image: redis:alpine
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 150M

volumes:
  pgdata:
