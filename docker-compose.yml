version: '3.8'

services:
  app:
    build: .
    container_name: agentswarp-server
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_PATH: /app/data/agentswarp.db
      SECRET_KEY: ${SECRET_KEY:-changeme-generate-32-char-secret}
      JWT_SECRET: ${JWT_SECRET:-changeme-jwt-secret}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
    volumes:
      - data:/app/data
    mem_limit: 200m
    restart: unless-stopped
    networks:
      - internal
      - default
    depends_on:
      searxng:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build: ./apps/web
    container_name: agentswarp-web
    ports:
      - "3000:3000"
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3001}
      PUBLIC_WS_URL: ${PUBLIC_WS_URL:-ws://localhost:3001/ws}
    mem_limit: 64m
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy

  searxng:
    image: searxng/searxng:latest
    container_name: agentswarp-search
    ports:
      - "8080:8080"
    volumes:
      - searxng-config:/etc/searxng
    environment:
      BASE_URL: http://localhost:8080/
      INSTANCE_NAME: AgentSwarp Search
      AUTOCOMPLETE: "false"
    mem_limit: 256m
    restart: unless-stopped
    networks:
      - internal
      - default
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"

networks:
  internal:
    driver: bridge
    internal: true

volumes:
  data:
    driver: local
  searxng-config:
    driver: local

