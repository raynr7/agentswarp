# AgentSwarp √¢¬Ä¬î runs on 512MB RAM
# Start with: docker-compose up -d
# Open: http://localhost:3000

version: '3.8'

services:
  agentswarm:
    image: agentswarm/agentswarm:latest
    # Or build locally:
    # build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M   # Works on low-spec machines!
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Optional: Add Ollama for 100% offline AI
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 4G

volumes:
  data:
  # ollama_data:
